name: Upstream version check

on:
  schedule:
    - cron: '17 9 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compare pinned tag against Docker Hub
        id: compare
        run: |
          PINNED=$(grep -rho "dockerTag: '[^']*'" startos | head -1 | cut -d"'" -f2 | cut -d: -f2)
          LATEST=$(curl -s "https://hub.docker.com/v2/repositories/b1ackswan/btctx/tags?page_size=50" \
            | jq -r '.results[].name' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V \
            | tail -1)
          echo "pinned=$PINNED" >> "$GITHUB_OUTPUT"
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          if [ -z "$LATEST" ]; then
            echo "Could not determine latest upstream tag" >&2
            exit 1
          fi
          if [ "$PINNED" = "$LATEST" ]; then
            echo "Up to date ($PINNED)"
            echo "outdated=false" >> "$GITHUB_OUTPUT"
          else
            echo "Pinned $PINNED, upstream has $LATEST"
            echo "outdated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open tracking issue if outdated
        if: steps.compare.outputs.outdated == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          PINNED: ${{ steps.compare.outputs.pinned }}
          LATEST: ${{ steps.compare.outputs.latest }}
        run: |
          TITLE="Upstream BitcoinTX $LATEST is available (wrapper pins $PINNED)"
          EXISTING=$(gh issue list --state open --search "in:title \"Upstream BitcoinTX $LATEST\"" --json number --jq '.[0].number')
          if [ -n "$EXISTING" ]; then
            echo "Issue #$EXISTING already tracks $LATEST"
            exit 0
          fi
          gh issue create --title "$TITLE" --body "$(printf 'Docker Hub has a newer BitcoinTX release.\n\n- Pinned in manifest: `%s`\n- Latest upstream tag: `%s`\n\nTo update, follow the version bumping checklist in CLAUDE.md.' "$PINNED" "$LATEST")"
