name: Release

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'release/*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.6.0-beta); created at the dispatched commit if it does not exist'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      START_CLI_VERSION: v0.4.0-beta.9
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install squashfs tools
        run: sudo apt-get update && sudo apt-get install -y squashfs-tools squashfs-tools-ng

      - name: Enable docker containerd image store
        run: |
          sudo mkdir -p /etc/docker
          if [ -f /etc/docker/daemon.json ]; then
            sudo jq '. + {"features": {"containerd-snapshotter": true}}' /etc/docker/daemon.json > /tmp/daemon.json
          else
            echo '{"features":{"containerd-snapshotter":true}}' > /tmp/daemon.json
          fi
          sudo cp /tmp/daemon.json /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Install start-cli
        run: |
          curl -sSL -o /usr/local/bin/start-cli \
            "https://github.com/Start9Labs/start-os/releases/download/${START_CLI_VERSION}/start-cli_x86_64-linux"
          chmod +x /usr/local/bin/start-cli
          start-cli --version

      - name: Pull upstream image (all architectures)
        run: |
          IMAGE=$(grep -rho "dockerTag: '[^']*'" startos | head -1 | cut -d"'" -f2)
          echo "Pinned image: $IMAGE"
          docker pull --platform linux/amd64 "$IMAGE"
          docker pull --platform linux/arm64 "$IMAGE"

      - name: Build s9pk
        run: make

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME#release/}"
          fi
          VERSION=$(node -p "require('./javascript/index.js').manifest.version")
          NOTES=$(node -p "require('./javascript/index.js').manifest.releaseNotes")
          gh release create "$TAG" --target "$GITHUB_SHA" \
            --title "v${VERSION}" --notes "$NOTES" ./btctx.s9pk
